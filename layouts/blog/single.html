{{ define "main" }}
<header>
    <h1>{{ .Title }}</h1>
    <time datetime="{{.Date.Format " 2006-01-02"}}">
        {{.Date | time.Format ":date_long"}}
        {{ if gt .Lastmod .Date }}
        - modification: {{.Lastmod | time.Format ":date_long"}}
        {{ end }}
    </time>
</header>
{{ partial "toc" . }}
{{ .Content }}
{{ end }}
