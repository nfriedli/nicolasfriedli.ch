baseURL: https://nicolasfriedli.ch
title: Nicolas Friedli

languageCode: fr-ch
defaultContentLanguage: fr

canonifyURLs: true
copyright: Creative Commons by-sa
disableFastRender: true
enableGitInfo: true
cleandestinationdir: true
removePathAccents: true

author:
  name: Nicolas Friedli
  email: nicolasfriedli@protonmail.ch

disableKinds:
  - taxonomy
  - term
  - robotsTXT
  - 404

imaging:
  resampleFilter: catmullrom
  quality: 80
  bgColor: ffffff
  exif: 
    includeFields: ".*"

markup:
  defaultMarkdownHandler: goldmark
  goldmark:
    extensions:
      typographer: true
    parser:
      autoHeadingIDType: github-ascii
    renderer:
      unsafe: true
  highlight:
    style: monokai
    noClasses: false

params:
  title: Nicolas Friedli
  slogan: consultant web indépendant
  images: 
    - https://cdn.pixabay.com/photo/2012/12/19/18/12/scrapyard-70908_960_720.jpg
  footer : |
    Un [flux RSS](/index.xml "S'abonner au site par flux RSS") permet de s'abonner au site. Ce site respecte votre vie privée; il ne vous traque pas. Sauf mention contraire, tous les contenus sont publiés sous [licence CC by-sa](https://creativecommons.org/licenses/by-sa/3.0/ch/deed.fr "Creative Commons - Attribution et partage dans les mêmes conditions").