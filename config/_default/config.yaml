baseURL: https://nicolasfriedli.ch
title: Nicolas Friedli

languageCode: fr-ch
defaultContentLanguage: fr

canonifyURLs: true
copyright: Creative Commons by-sa
disableFastRender: true
enableGitInfo: true
cleandestinationdir: true
removePathAccents: true

author:
  name: Nicolas Friedli
  email: nicolasfriedli@protonmail.ch

disableKinds:
  - taxonomy
  - term
  - robotsTXT
  - 404

imaging:
  resampleFilter: catmullrom
  quality: 80
  bgColor: ffffff
  exif: 
    includeFields: ".*"

markup:
  defaultMarkdownHandler: goldmark
  goldmark:
    extensions:
      typographer: true
    parser:
      autoHeadingIDType: github-ascii
    renderer:
      unsafe: true
  highlight:
    style: monokai
    noClasses: false

params:
  title: Nicolas Friedli
  slogan: consultant web indépendant
  images: 
    - https://cdn.pixabay.com/photo/2012/12/19/18/12/scrapyard-70908_960_720.jpg
  footer : |
    Un [flux RSS](/index.xml "S'abonner au site par flux RSS") permet de s'abonner au site. Les contenus sont publiés sous licence CC by-sa, voir [À propos de ce site](/about/ "Informations techniques et rédactionnelles"). Les coordonnées de l'auteur se trouvent sur [Contact](/contact/ "Contacter Nicolas Friedli"). Un [plan du site](/plan/ "Plan complet du site de Nicolas Friedli") est disponible.